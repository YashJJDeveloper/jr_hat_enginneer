<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="">
        <fieldset>
            <legend> Personal Details : </legend>
            <label for="full-name">Full Name :</label>
            <input type="text" id="full-name" name="full-name" placeholder="Enter your full name">
            <br><br>
            <label for="gender">Gender :</label>
            <input type="radio" id="gender" name="gender" value="male">
            <label for="gender">Male</label>
            <input type="radio" id="gender" name="gender" value="female">
            <label for="gender">Female</label>
            <br><br>
            <label for="dob">📅 Date of Birth :</label>
            <input type="date" id="dob" name="dob">
            <br><br>
            <label for="nationality">🌎 Nationality :</label>
            <input type="text" id="nationality" name="nationality" placeholder="Enter your nationality">
            <br><br>
            <label for="phone-number">📞 Phone Number :</label>
            <input type="tel" id="phone-number" name="phone-number" placeholder="Enter your phone number">
            <br><br>
            <label for="email">📧 Email :</label>
            <input type="email" id="email" name="email" placeholder="Enter your email">
            <br><br>
            <label for="Adhar">💳 Adhar Number :</label>
            <input type="text" id="Adhar" name="Adhar" placeholder="Enter your Adhar number">
        </fieldset>
    </form>
    <h1>Step 2 : Address Details </h1>
    <form action="">
        <fieldset>
            <legend> Address Details : </legend>
            <label for="address">🏠 Address :</label>
            <input type="text" id="address" name="address" placeholder="Enter your address">
            <br><br>
            <label for="city">🏙️ City :</label>
            <input type="text" id="city" name="city" placeholder="Enter your city">
            <br><br>
            <label for="state">🏞️ State :</label>
            <input type="text" id="state" name="state" placeholder="Enter your state">
            <br><br>
            <label for="postal-code">📮 Postal Code :</label>
            <input type="text" id="postal-code" name="postal-code" placeholder="Enter your postal code">
        </fieldset>
    </form>
    <h1>Step 3 : Account Details</h1>
    <form action="">
        <fieldset>
            <legend> Account Details : </legend>
            <label for="username">👤 Username :</label>
            <input type="text" id="username" name="username" placeholder="Enter your username">
            <br><br>
            <label for="password">🔒 Password :</label>
            <input type="password" id="password" name="password" placeholder="Enter your password">
            <br><br>
            <label for="confirm-password">🔒 Confirm Password :</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password">
        </fieldset>
    </form>
    <h1>Step 4 : Login Details</h1>
    <form action="">
        <fieldset>
            <legend> Login Details : </legend>
            <label for="login-username">👤 Username :</label>
            <input type="text" id="login-username" name="login-username" placeholder="Enter your username">
            <br><br>
            <label for="login-password">🔒 Password :</label>
            <input type="password" id="login-password" name="login-password" placeholder="Enter your password">
        </fieldset>
        <input type="checkbox" name="t&c" id=""> I agree to the terms and conditions
        <br><br>
        <button type="submit">Login</button>
    </form>
</body>

</html>
