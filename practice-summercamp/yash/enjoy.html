<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Page 2</h1>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRa0CYOrYIMRJciw6-dDcxVEzF6NMWbqbVfKQ&s"
        width="200px" height="200px" alt="">
    <a href="https://en.wikipedia.org/wiki/Tiger">Tiger</a>
    <form action="">
        <label for="name">Name : </label>
        <input type="text" id="name" name="name">
        <br>
        <br>
        <label for="gender">Gender : </label>
        <input type="radio" name="gender">
        Male
        <input type="radio" name="gender"> Female
        <br><br>
        <label for="dob">DOB</label>
        <input type="datetime-local" name="dob">
        <br><br>
        <label for="mobile">Mobile : </label>
        <input type="number" name="mobile">
        <br><br>
        <label for="email">Email : </label>
        <input type="email" name="email">
        <br><br>
        <label for="address">Address : </label>
        <input type="text" name="address">

        <label for="pincode">Pincode : </label>
        <input type="number" name="pincode">
        <br><br>
        <label for="course"> Course :</label>
        <select name="course">
            <option value="HTML">HTML</option>
            <option value="CSS">CSS</option>
            <option value="JS">JS</option>
        </select>
        <br><br>
        <label for="hobbies">Hobbies :</label>
        <input type="checkbox" name="hobbies"> Playing
        <input type="checkbox" name="hobbies"> Singing
        <input type="checkbox" name="hobbies"> Dancing
        <br><br>
        <label for="photo">Passport Photo :</label>
        <input type="file" name="photo">

        <label for="color">Favorite Color :</label>
        <input type="color" name="color">
        <br><br>
        <label for="range">Communication Skills :</label>
        <input type="range" name="range" min="0" max="10">
        <input type="reset" value="Reset">
        <input type="submit" value="Submit">
        <button type="submit">Submit the form</button>
    </form>


</body>

</html>
